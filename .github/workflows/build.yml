name: build

on:

  pull_request:
    branches:
    - main
  push:
    branches:
    - main
  workflow_dispatch: {}

jobs:

  build:
    runs-on: ubuntu-latest
    container: texlive/texlive:latest
    steps:

    - name: Install fonts
      run: |
        apt update
        apt install -y --no-install-recommends fonts-roboto fonts-adobe-sourcesans3

    - name: Checkout 🔽
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Checkout private data 🔽
      uses: actions/checkout@v6
      with:
        repository: alexjorgef/cv-data
        token: ${{ secrets.DATA_GITHUB_TOKEN }}
        path: cv-data

    - name: Inject data 🔨
      run: cp -rp cv-data/production/* .

    - name: Build Curriculum Vitae 🔨
      run: SOURCE_DATE_EPOCH=1 xelatex cv.tex

    - name: Build Résumé 🔨
      run: SOURCE_DATE_EPOCH=1 xelatex resume.tex

    - name: Upload artifacts 🔼
      uses: actions/upload-artifact@v7
      if: github.ref == 'refs/heads/main'
      with:
        name: cv-artifacts
        path: |
          cv.pdf
          resume.pdf
        if-no-files-found: error

  deploy:
    needs: build
    if: success() && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.ghpages-deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:

    - name: Checkout 🔽
      uses: actions/checkout@v6

    - name: Download artifacts 🔽
      uses: actions/download-artifact@v8
      with:
        name: cv-artifacts
        path: cv-output

    - name: Copy landing page files 🔨
      run: cp index.html robots.txt logo.png favicon.ico cv-output/

    - name: Setup Pages
      uses: actions/configure-pages@v6

    - name: Upload artifact 🔼
      uses: actions/upload-pages-artifact@v5
      with:
        path: cv-output

    - name: Deploy to GitHub Pages 🚀
      id: ghpages-deployment
      uses: actions/deploy-pages@v5
